services:
  proxy:
    build:
      context: ./infra/caddy
      dockerfile: Dockerfile
    container_name: wikilive-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend-java:
        condition: service_healthy
      backend-go:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wikilive-frontend
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend-java:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: wikilive-backend-java
    environment:
      - PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=wikilive
      - POSTGRES_USER=wikilive
      - POSTGRES_PASSWORD=wikilive
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: wikilive-backend-go
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/wikilive
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: wikilive-postgres
    environment:
      - POSTGRES_DB=wikilive
      - POSTGRES_USER=wikilive
      - POSTGRES_PASSWORD=wikilive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikilive -d wikilive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: wikilive-mongo
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh --quiet mongodb://127.0.0.1:27017/test | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: wikilive-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  mongo_data:
  minio_data:
